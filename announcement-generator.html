<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leef | Emergency Announcement Generator</title>
    <style>
        :root {
            --bg: #0f1115;
            --card-bg: #1a1d23;
            --accent: #5aef7e;
            --accent-hover: #4cdb6c;
            --text: #e0e0e0;
            --text-muted: #9ba1a6;
            --border: #2d323a;
            --input-bg: #242930;
            --danger: #ff5555;
            --chip-bg: #2d323a;
            --chip-selected: #5aef7e;
            
            /* In-app mockup colors */
            --leef-primary: #17b340;
            --leef-modal-bg: rgba(235, 251, 235, 0.98);
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .layout {
            width: 100%;
            max-width: 1300px;
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 40px;
        }

        @media (max-width: 1100px) {
            .layout { grid-template-columns: 1fr; }
        }

        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 span {
            background: var(--accent);
            color: #000;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 800;
        }

        .field-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
        
        input, textarea, select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(90, 239, 126, 0.15);
        }

        .version-selector {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .version-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .chip {
            padding: 6px 12px;
            background: var(--chip-bg);
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            user-select: none;
        }

        .chip:hover { border-color: var(--accent); }
        .chip.selected {
            background: var(--chip-selected);
            color: #000;
            font-weight: 700;
        }
        .chip.in-range {
            background: rgba(90, 239, 126, 0.2);
            border-color: var(--accent);
        }

        .mode-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .mode-btn {
            flex: 1;
            padding: 8px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 600;
        }

        .mode-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .button-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            position: relative;
        }

        .btn-remove {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none; border: none; color: var(--danger);
            cursor: pointer; font-size: 1.2rem; opacity: 0.6;
        }

        .btn-add {
            width: 100%; background: transparent; border: 1px dashed var(--border);
            color: var(--text-muted); padding: 12px; border-radius: 12px;
            cursor: pointer; margin-top: 10px; transition: all 0.2s ease;
        }

        .sidebar { display: flex; flex-direction: column; gap: 30px; }
        
        .json-preview {
            background: #000; padding: 24px; border-radius: 16px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
            white-space: pre-wrap; color: var(--accent);
            max-height: 400px; overflow-y: auto; border: 1px solid var(--border);
        }

        .copy-btn {
            background: var(--accent); color: #000; border: none;
            padding: 16px; border-radius: 12px; font-weight: 700;
            cursor: pointer; width: 100%;
        }

        /* --- APP PREVIEW MOCKUP --- */
        .app-preview-container {
            background: #f0f4f0;
            border-radius: 20px;
            height: 450px;
            position: relative;
            overflow: hidden;
            border: 4px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .app-topbar {
            height: 40px;
            background: #fff;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
        }

        .app-dot { width: 10px; height: 10px; border-radius: 50%; background: #eee; }

        .app-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app-modal {
            background: var(--leef-modal-bg);
            backdrop-filter: blur(25px);
            border: 1.5px solid rgba(23, 179, 64, 0.15);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.2);
            color: #111;
        }

        .app-modal h3 { margin: 0 0 10px 0; font-size: 1.1rem; font-weight: 700; color: #111; display: flex; align-items: center; gap: 8px; }
        .app-modal p.msg { font-size: 0.85rem; color: #444; line-height: 1.5; margin: 0 0 20px 0; }
        .app-modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
        
        .app-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }
        .app-btn-confirm { background: var(--leef-primary); color: #000; }
        .app-btn-cancel { background: rgba(0, 0, 0, 0.06); color: #555; }

        .app-modal-footer {
            font-size: 0.65rem; color: #999; margin-top: 15px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 8px; font-style: italic;
        }
        /* --- ALERT MANAGEMENT --- */
        .alert-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .alert-tab {
            padding: 8px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-tab.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(90, 239, 126, 0.05);
        }

        .alert-tab .remove {
            font-size: 1.1rem;
            opacity: 0.5;
        }

        .alert-tab .remove:hover { opacity: 1; color: var(--danger); }

        .btn-add-alert {
            padding: 8px 16px;
            background: transparent;
            border: 1px dashed var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .btn-add-alert:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

    <div class="layout">
        <div class="container">
            <h1>Leef <span>Emergency</span></h1>

            <div class="alert-tabs" id="alert-tabs">
                <!-- Dynamic tabs here -->
                <button class="btn-add-alert" onclick="addAlert()">+ New Alert</button>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="field-group">
                    <label>Status</label>
                    <label class="checkbox-group" style="background: var(--input-bg); padding: 12px; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; gap: 10px; color: #fff; cursor: pointer;">
                        <input type="checkbox" id="active" checked onchange="saveCurrentAlert()"> Announcement Active
                    </label>
                </div>
                <div class="field-group">
                    <label for="repo">Target Repository (Fork Protection)</label>
                    <input type="text" id="repo" placeholder="git-QTech/leef" oninput="saveCurrentAlert()">
                </div>
            </div>

            <div class="field-group">
                <label for="title">Title</label>
                <input type="text" id="title" placeholder="e.g. MAJOR BUG ALERT" oninput="saveCurrentAlert()">
            </div>

            <div class="field-group">
                <label for="message">Message Body</label>
                <textarea id="message" rows="3" placeholder="Explain the situation clearly..."></textarea>
            </div>

            <div class="version-selector">
                <label>Target Versions</label>
                <div class="mode-toggle">
                    <button class="mode-btn" onclick="setMode('all')" id="mode-all">ALL</button>
                    <button class="mode-btn" onclick="setMode('single')" id="mode-single">SINGLE</button>
                    <button class="mode-btn" onclick="setMode('range')" id="mode-range">RANGE</button>
                    <button class="mode-btn" onclick="setMode('multi')" id="mode-multi">MULTI</button>
                </div>
                
                <div id="version-chips-container" class="version-chips"></div>
                
                <div style="margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px;">
                    <label style="font-size: 0.7rem;">Final Target String (Auto-generated)</label>
                    <input type="text" id="targetVersion" style="background: transparent; border: none; padding: 0; color: var(--accent); font-family: monospace;" readonly>
                </div>
            </div>

            <div style="margin-top: 30px;">
                <label>Action Buttons</label>
                <div id="buttons-container"></div>
                <button class="btn-add" onclick="addButton()">+ Add Button</button>
            </div>
        </div>

        <div class="sidebar">
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <label>Live App Preview</label>
                <div class="app-preview-container">
                    <div class="app-topbar">
                        <div class="app-dot"></div>
                        <div class="app-dot"></div>
                        <div class="app-dot"></div>
                        <div style="flex: 1; height: 16px; background: #f5f5f5; border-radius: 4px;"></div>
                    </div>
                    <div class="app-overlay" id="preview-overlay">
                        <div class="app-modal">
                            <h3><span id="prev-icon">⚠️</span> <span id="prev-title">Announcement</span></h3>
                            <p class="msg" id="prev-message">Explain the situation clearly...</p>
                            <div class="app-modal-actions" id="prev-actions">
                                <button class="app-btn app-btn-confirm">Update Now</button>
                                <button class="app-btn app-btn-cancel">Dismiss</button>
                            </div>
                            <div class="app-modal-footer">
                                <strong>Leef Privacy:</strong> This announcement was fetched from a secure public GitHub Gist. No personal data was shared.
                            </div>
                        </div>
                    </div>
                    <div id="preview-inactive" style="display: none; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.05); color: #999; font-size: 0.9rem; font-weight: 600;">
                        Announcement Inactive
                    </div>
                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 10px;">
                <label>JSON Output</label>
                <div id="json-output" class="json-preview"></div>
                <button class="copy-btn" onclick="copyJson()">Copy to Clipboard</button>
            </div>
        </div>
    </div>

    <script>
        const versions = ["0.5.1", "0.5.2"];

        let announcements = [
            {
                active: true,
                title: "Announcement",
                message: "Explain the situation clearly...",
                targetVersion: "all",
                repo: "git-QTech/leef",
                buttons: [
                    { text: "Update Now", action: "url", value: "https://github.com/git-QTech/leef/releases" },
                    { text: "Dismiss", action: "dismiss", value: "" }
                ]
            }
        ];
        let currentIndex = 0;

        async function fetchVersions() {
            try {
                const res = await fetch('https://api.github.com/repos/git-QTech/leef/tags');
                const tags = await res.json();
                const fetched = tags.map(t => t.name.replace(/^v/, '')).sort((a, b) => {
                    const pa = a.split('.').map(Number);
                    const pb = b.split('.').map(Number);
                    for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
                        const n1 = pa[i] || 0; n2 = pb[i] || 0;
                        if (n1 !== n2) return n1 - n2;
                    }
                    return 0;
                });
                if (fetched.length > 0) {
                    versions.length = 0; versions.push(...fetched);
                    renderChips(); updateJson();
                }
            } catch (e) { console.warn("GitHub fetch failed, using defaults"); }
        }

        function renderTabs() {
            const container = document.getElementById('alert-tabs');
            container.innerHTML = '';
            announcements.forEach((a, i) => {
                const tab = document.createElement('div');
                tab.className = `alert-tab ${i === currentIndex ? 'active' : ''}`;
                tab.innerHTML = `<span>Alert ${i+1}</span> <span class="remove" onclick="removeAlert(event, ${i})">&times;</span>`;
                tab.onclick = () => switchAlert(i);
                container.appendChild(tab);
            });
            const addBtn = document.createElement('button');
            addBtn.className = 'btn-add-alert';
            addBtn.textContent = '+ New Alert';
            addBtn.onclick = addAlert;
            container.appendChild(addBtn);
        }

        function addAlert() {
            announcements.push({
                active: true,
                title: "New Announcement",
                message: "Description...",
                targetVersion: "all",
                repo: "git-QTech/leef",
                buttons: [{ text: "Dismiss", action: "dismiss", value: "" }]
            });
            currentIndex = announcements.length - 1;
            loadAlert(currentIndex);
        }

        function removeAlert(e, index) {
            e.stopPropagation();
            if (announcements.length === 1) return;
            announcements.splice(index, 1);
            if (currentIndex >= announcements.length) currentIndex = announcements.length - 1;
            loadAlert(currentIndex);
        }

        function switchAlert(index) {
            currentIndex = index;
            loadAlert(currentIndex);
        }

        function loadAlert(index) {
            const a = announcements[index];
            document.getElementById('active').checked = a.active;
            document.getElementById('repo').value = a.repo || 'git-QTech/leef';
            document.getElementById('title').value = a.title;
            document.getElementById('message').value = a.message;
            
            // Re-map version targeting
            if (a.targetVersion === 'all') setMode('all');
            else if (a.targetVersion.includes(',')) {
                setMode('multi');
                selectedVersions = a.targetVersion.split(',').map(v => versions.indexOf(v.trim())).filter(idx => idx !== -1);
            } else if (a.targetVersion.includes(' - ')) {
                setMode('range');
                const parts = a.targetVersion.split(' - ');
                rangeStart = versions.indexOf(parts[0].trim());
                rangeEnd = versions.indexOf(parts[1].trim());
            } else {
                setMode('single');
                selectedVersions = [versions.indexOf(a.targetVersion.trim())];
            }

            buttons = JSON.parse(JSON.stringify(a.buttons));
            renderTabs();
            renderChips();
            renderButtons();
            updateJson();
        }

        function saveCurrentAlert() {
            const a = announcements[currentIndex];
            a.active = document.getElementById('active').checked;
            a.repo = document.getElementById('repo').value;
            a.title = document.getElementById('title').value;
            a.message = document.getElementById('message').value;
            a.targetVersion = document.getElementById('targetVersion').value.replace(' (Select end...)', '');
            a.buttons = JSON.parse(JSON.stringify(buttons));
            updateJson();
        }

        let currentMode = 'all';
        let selectedVersions = [];
        let rangeStart = -1, rangeEnd = -1;

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            const btn = document.getElementById('mode-' + mode);
            if (btn) btn.classList.add('active');
            
            if (mode === 'all') { selectedVersions = []; rangeStart = -1; rangeEnd = -1; }
            renderChips(); updateJson();
        }

        function renderChips() {
            const container = document.getElementById('version-chips-container');
            container.innerHTML = '';
            if (currentMode === 'all') {
                container.innerHTML = '<p style="font-size: 0.8rem; opacity: 0.6; margin: 0;">Targeting every version of Leef Browser.</p>';
                document.getElementById('targetVersion').value = 'all';
                return;
            }
            versions.forEach((v, i) => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.textContent = v;
                if (currentMode === 'single') {
                    if (selectedVersions.includes(i)) chip.classList.add('selected');
                    chip.onclick = () => { selectedVersions = [i]; saveCurrentAlert(); renderChips(); };
                } else if (currentMode === 'multi') {
                    if (selectedVersions.includes(i)) chip.classList.add('selected');
                    chip.onclick = () => {
                        if (selectedVersions.includes(i)) selectedVersions = selectedVersions.filter(idx => idx !== i);
                        else selectedVersions.push(i);
                        saveCurrentAlert(); renderChips();
                    };
                } else if (currentMode === 'range') {
                    if (i === rangeStart || i === rangeEnd) chip.classList.add('selected');
                    else if (rangeStart !== -1 && rangeEnd !== -1) {
                        const low = Math.min(rangeStart, rangeEnd);
                        const high = Math.max(rangeStart, rangeEnd);
                        if (i > low && i < high) chip.classList.add('in-range');
                    }
                    chip.onclick = () => {
                        if (rangeStart === -1 || (rangeStart !== -1 && rangeEnd !== -1)) { rangeStart = i; rangeEnd = -1; }
                        else { rangeEnd = i; }
                        saveCurrentAlert(); renderChips();
                    };
                }
                container.appendChild(chip);
            });
            let str = '';
            if (currentMode === 'single' && selectedVersions.length > 0) str = versions[selectedVersions[0]];
            else if (currentMode === 'multi') str = selectedVersions.sort((a,b) => a-b).map(idx => versions[idx]).join(', ');
            else if (currentMode === 'range' && rangeStart !== -1 && rangeEnd !== -1) {
                const low = Math.min(rangeStart, rangeEnd);
                const high = Math.max(rangeStart, rangeEnd);
                str = versions[low] + ' - ' + versions[high];
            } else if (rangeStart !== -1) { str = versions[rangeStart] + ' (Select end...)'; }
            document.getElementById('targetVersion').value = str || 'all';
        }

        const buttonsContainer = document.getElementById('buttons-container');
        const jsonOutput = document.getElementById('json-output');

        let buttons = [];

        function renderButtons() {
            buttonsContainer.innerHTML = '';
            buttons.forEach((btn, index) => {
                const div = document.createElement('div');
                div.className = 'button-item';
                div.innerHTML = `
                    <button class="btn-remove" onclick="removeButton(${index})">&times;</button>
                    <div class="field-group"><label>Text</label><input type="text" value="${btn.text}" oninput="updateButton(${index}, 'text', this.value)"></div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div class="field-group"><label>Action</label>
                            <select onchange="updateButton(${index}, 'action', this.value)">
                                <option value="url" ${btn.action === 'url' ? 'selected' : ''}>URL</option>
                                <option value="dismiss" ${btn.action === 'dismiss' ? 'selected' : ''}>Dismiss</option>
                                <option value="dismiss_24h" ${btn.action === 'dismiss_24h' ? 'selected' : ''}>Dismiss 24h</option>
                                <option value="exit" ${btn.action === 'exit' ? 'selected' : ''}>Exit Browser</option>
                            </select>
                        </div>
                        <div class="field-group" style="display: ${btn.action === 'url' ? 'block' : 'none'}"><label>URL</label><input type="text" value="${btn.value || ''}" oninput="updateButton(${index}, 'value', this.value)"></div>
                    </div>
                `;
                buttonsContainer.appendChild(div);
            });
            updateJson();
        }

        function addButton() { buttons.push({ text: "New Button", action: "dismiss", value: "" }); renderButtons(); saveCurrentAlert(); }
        function removeButton(index) { buttons.splice(index, 1); renderButtons(); saveCurrentAlert(); }
        function updateButton(index, field, value) { buttons[index][field] = value; if (field === 'action') renderButtons(); saveCurrentAlert(); }

        function updateJson() {
            jsonOutput.textContent = JSON.stringify(announcements, null, 2);
            updatePreview(announcements[currentIndex]);
        }

        function updatePreview(data) {
            if (!data) return;
            const overlay = document.getElementById('preview-overlay');
            const inactive = document.getElementById('preview-inactive');
            const titleEl = document.getElementById('prev-title');
            const msgEl = document.getElementById('prev-message');
            const actionsEl = document.getElementById('prev-actions');

            if (!data.active) {
                overlay.style.display = 'none';
                inactive.style.display = 'flex';
                return;
            } else {
                overlay.style.display = 'flex';
                inactive.style.display = 'none';
            }

            titleEl.textContent = data.title;
            const isCritical = data.buttons.some(b => b.action === 'exit');
            if (isCritical) {
                msgEl.innerHTML = data.message + '<br><br><strong style="color:var(--danger); font-size:0.7rem; text-transform:uppercase;">[CRITICAL UPDATE REQUIRED]</strong>';
            } else {
                msgEl.textContent = data.message;
            }

            actionsEl.innerHTML = '';
            data.buttons.forEach((btn, i) => {
                const b = document.createElement('button');
                b.className = 'app-btn ' + (i === 0 ? 'app-btn-confirm' : 'app-btn-cancel');
                b.textContent = btn.text;
                actionsEl.appendChild(b);
            });
        }

        function copyJson() {
            navigator.clipboard.writeText(jsonOutput.textContent);
            const btn = document.querySelector('.copy-btn');
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy to Clipboard', 2000);
        }

        document.getElementById('message').addEventListener('input', saveCurrentAlert);
        renderTabs(); loadAlert(0); fetchVersions();
    </script>
</body>
</html>
